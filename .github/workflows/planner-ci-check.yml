name: "🔨 Build & Check"
on:
  workflow_call:

jobs:

  validate:
    name: "🦺 Validation"
    uses: TWiStErRob/github-workflows/.github/workflows/validate.yml@b2ac1bf35e26a7042bbedcd6815faaee3f20a2a8 # v3
    permissions:
      contents: read
      security-events: write
      actions: read

  gradle:
    name: "gradle"
    needs:
      - validate
    uses: ./.github/workflows/planner-ci-check-gradle.yml
    permissions:
      contents: read
      checks: write
      security-events: write

  npm:
    name: "npm"
    needs:
      - validate
    uses: ./.github/workflows/planner-ci-check-npm.yml
    permissions:
      contents: read
      checks: write
    secrets: inherit
