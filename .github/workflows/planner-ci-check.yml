name: "🔨 Build & Check"
on:
  workflow_call:

jobs:

  validate:
    name: "🦺 Validation"
    uses: TWiStErRob/github-workflows/.github/workflows/validate.yml@104620e2c495f0c905fde6f15ea2b6453ae4eaed # v3
    permissions:
      contents: read
      security-events: write
      actions: read

  gradle:
    name: "gradle"
    needs:
      - validate
    uses: ./.github/workflows/planner-ci-check-gradle.yml
    permissions:
      contents: read
      checks: write
      security-events: write

  npm:
    name: "npm"
    needs:
      - validate
    uses: ./.github/workflows/planner-ci-check-npm.yml
    permissions:
      contents: read
      checks: write
    secrets: inherit
